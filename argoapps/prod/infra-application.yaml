apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ustbite-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: default
  source:
    repoURL: https://github.com/USTBitesHub/ustbite-helm-charts.git
    targetRevision: main
    path: infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  revisionHistoryLimit: 2
  # Ignore auto-added default fields in Gateway API resources
  # Kubernetes populates group/kind/weight after every apply, causing false OutOfSync
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind

