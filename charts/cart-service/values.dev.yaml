suffix: dev
replicaCount: 1
image:
  repository: ustbiteshub/ustbite-cart-service
  pullPolicy: Always
  tag: latest
service:
  type: ClusterIP
  port: 8010
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-cart-service
  SERVICE_PORT: "8010"
  LOG_LEVEL: "DEBUG"
  REDIS_TTL_SECONDS: "3600"
  REDIS_URL: "redis://ustbite-redis.ustbite-data.svc.cluster.local:6379"
  JWT_SECRET: "ustbite-jwt-secret-dev-only"
secrets: {}
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
autoscaling:
  enabled: false
podDisruptionBudget:
  enabled: false
serviceAccount:
  create: true
  name: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
