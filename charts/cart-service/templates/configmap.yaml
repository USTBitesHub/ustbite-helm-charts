apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  namespace: {{ .Values.namespace }}
data:
  SERVICE_NAME: {{ .Values.env.SERVICE_NAME }}
  SERVICE_PORT: {{ .Values.env.SERVICE_PORT | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL }}
  REDIS_TTL_SECONDS: {{ .Values.env.REDIS_TTL_SECONDS | default "3600" | quote }}
  DATABASE_HOST: ustbite-cart-service-postgres.ustbite-data.svc.cluster.local
  DATABASE_PORT: "5432"
  DATABASE_NAME: ustbite_cart_db
  {{- if .Values.env.REDIS_URL }}
  REDIS_URL: {{ .Values.env.REDIS_URL }}
  {{- end }}
  {{- if .Values.env.DATABASE_URL }}
  DATABASE_URL: {{ .Values.env.DATABASE_URL }}
  {{- end }}
  {{- if .Values.env.JWT_SECRET }}
  JWT_SECRET: {{ .Values.env.JWT_SECRET }}
  {{- end }}
