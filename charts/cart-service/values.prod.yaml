replicaCount: 1
image:
  repository: ustbiteshub/ustbite-cart-service
  pullPolicy: IfNotPresent
  tag: cart-service-v0.0.4
service:
  type: ClusterIP
  port: 8010
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-cart-service
  SERVICE_PORT: "8010"
  LOG_LEVEL: "INFO"
secrets:
  # Create this secret on the cluster:
  # kubectl create secret generic ustbite-cart-service-prod-secret -n ustbite-backend \
  #   --from-literal=DATABASE_URL="postgresql+asyncpg://ustbite_user:PASSWORD@ustbite-cart-service-postgres.ustbite-data.svc.cluster.local:5432/ustbite_cart_db" \
  #   --from-literal=JWT_SECRET="<same-value-as-user-service-JWT_SECRET>"
  DATABASE_URL: ""
  JWT_SECRET: ""
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: false
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
