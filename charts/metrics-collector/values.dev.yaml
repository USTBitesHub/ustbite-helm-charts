replicaCount: 1
image:
  repository: ustbiteshub/ustbite-metrics-collector
  pullPolicy: IfNotPresent
  tag: develop-6319b7b3
service:
  type: ClusterIP
  port: 8007
namespace: ustbite-ops
env:
  SERVICE_NAME: ustbite-metrics-collector
  SERVICE_PORT: "8007"
  LOG_LEVEL: "INFO"
secrets:
  DATABASE_URL: ""
  REDIS_URL: ""
  RABBITMQ_URL: ""
  SECRET_KEY: ""
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5