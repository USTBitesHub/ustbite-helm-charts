replicaCount: 1
image:
  repository: ustbiteshub/ustbite-frontend
  pullPolicy: IfNotPresent
  tag: frontend-v0.1.0
service:
  type: ClusterIP
  port: 8080
namespace: ustbite-frontend
env:
  SERVICE_NAME: ustbite-frontend
  LOG_LEVEL: "INFO"
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
