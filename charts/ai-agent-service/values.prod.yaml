replicaCount: 1
image:
  repository: ustbiteshub/ustbite-ai-agent-service
  pullPolicy: IfNotPresent
  tag: ai-agent-service-v0.0.11
service:
  type: ClusterIP
  port: 8009
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-ai-agent-service
  SERVICE_PORT: "8009"
  LOG_LEVEL: "INFO"
  OLLAMA_MODEL: "qwen2.5:3b"
  OLLAMA_HOST: "http://54.85.49.94:11434"
  CART_SERVICE_URL: "http://cart-service-prod:8010"
  ORDER_SERVICE_URL: "http://ustbite-order-service-prod:8003"
  RESTAURANT_SERVICE_URL: "http://ustbite-restaurant-service-prod:8002"
secrets: {}
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30