# ============================================================
# KGateway Namespace Network Policies (Envoy Proxy)
# Envoy-based KGateway listens on 80/443 externally,
# forwards to ustbite-frontend and ustbite-backend,
# and proxies ArgoCD UI + Keycloak login UI.
# ============================================================

# Allow external internet traffic into KGateway Envoy listeners
# NOTE: NetworkPolicies match pod container ports (targetPort), NOT Service ports.
# Envoy listens on 8080 (HTTP) and 8443 (HTTPS) internally.
# 172.31.0.0/16 = AWS VPC CIDR (covers HAProxy EC2 instance)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-external-ingress
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Public internet + VPC (HAProxy EC2 at 172.31.x.x)
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 8080    # Envoy HTTP container port (Service maps 80→8080)
          protocol: TCP
        - port: 8443    # Envoy HTTPS container port (Service maps 443→8443)
          protocol: TCP
        - port: 80      # In case kgateway variant listens directly on 80
          protocol: TCP
        - port: 443     # In case kgateway variant listens directly on 443
          protocol: TCP
---
# Allow Envoy proxy admin port (9901) within kgateway namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-envoy-admin-internal
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway
      ports:
        - port: 9901
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway
      ports:
        - port: 9901
          protocol: TCP
---
# Allow KGateway to forward traffic to ustbite-frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-egress-to-frontend
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-frontend
---
# Allow KGateway to forward API traffic to ustbite-backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-egress-to-backend
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-backend
---
# Allow KGateway to proxy ArgoCD UI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-egress-to-argocd
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - port: 8080
          protocol: TCP
        - port: 443
          protocol: TCP
---
# Allow KGateway to reach Keycloak for OAuth token validation / login redirect
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-egress-to-keycloak
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 8080
          protocol: TCP
---
# Allow KGateway DNS resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-dns-egress
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# *** CRITICAL *** Allow Envoy to reach the kgateway xDS control plane
# Envoy connects to kgateway.kgateway-system.svc.cluster.local:9977 (gRPC/ADS)
# to receive listener + cluster configuration.
# Without this, default-deny-all blocks xDS → Envoy has NO listeners → port 80 never opens.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-egress-to-xds-controlplane
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: 9977    # kgateway xDS / ADS gRPC server
          protocol: TCP
