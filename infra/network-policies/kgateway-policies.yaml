# KGateway namespace is infrastructure — no default-deny applied.
# This single policy documents that kgateway accepts external HTTP traffic.
# All internal routing (xDS to kgateway-system, egress to backend/frontend etc.)
# flows freely since there is no default-deny on this namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kgateway-allow-external-ingress
  namespace: kgateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 80
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 443
          protocol: TCP
