# ============================================================
# Keycloak Namespace Network Policies
# Allows: kgateway ingress on 8080, DNS egress
# Blocks: everything else by default-deny
# ============================================================

# Allow kgateway (Envoy) to reach Keycloak for OIDC redirects
# and JWKS token validation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-allow-kgateway-ingress
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway
      ports:
        - port: 8080
          protocol: TCP
---
# Allow backend services to reach Keycloak for JWKS validation
# (only needed if services validate JWTs themselves, not just kgateway)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-allow-backend-ingress
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-backend
      ports:
        - port: 8080
          protocol: TCP
---
# Allow Keycloak DNS resolution (required for startup)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-allow-dns-egress
  namespace: keycloak
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
