# ustbite-ops — network policy
# default-deny-all applied (see default-deny-all.yaml)
# ai-agent, log-aggregator, metrics-collector
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ustbite-ops-allow-kgateway-ingress
  namespace: ustbite-ops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ustbite-ops-allow-egress
  namespace: ustbite-ops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Can reach backend services (for log aggregation / metrics)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-backend
    # ai-agent can reach its postgres in ustbite-data
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-data
    # ai-agent calls K8s API for cluster insights
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ustbite-ops-allow-dns-egress
  namespace: ustbite-ops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
