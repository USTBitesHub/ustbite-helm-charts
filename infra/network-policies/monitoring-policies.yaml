# Allow Prometheus/Grafana to receive scraped metrics from backend and ops
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-scraping-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-backend
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-frontend
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-ops
---
# Allow Prometheus to scrape (egress out to target namespaces)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-scraping-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-backend
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-frontend
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ustbite-ops
---
# Monitoring DNS egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-dns-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow kgateway to reach Grafana UI (port 3000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-allow-kgateway-ingress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway
      ports:
        - port: 3000
          protocol: TCP
