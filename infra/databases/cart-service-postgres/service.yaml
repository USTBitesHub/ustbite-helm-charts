apiVersion: v1
kind: Service
metadata:
  name: ustbite-cart-service-postgres
  namespace: ustbite-data
  labels:
    app: ustbite-cart-service-postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app: ustbite-cart-service-postgres
