# ─────────────────────────────────────────────────────────────────
# ReferenceGrants — required by Gateway API for cross-namespace routing
# Allows HTTPRoutes in the `kgateway` namespace to target Services
# in each of the backend namespaces.
# ─────────────────────────────────────────────────────────────────

apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-kgateway-httproutes
  namespace: ustbite-backend
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kgateway
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-kgateway-httproutes
  namespace: ustbite-frontend
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kgateway
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-kgateway-httproutes
  namespace: argocd
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kgateway
  to:
    - group: ""
      kind: Service
