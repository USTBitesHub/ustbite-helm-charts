apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ustbite-gateway
  namespace: kgateway
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
  # HTTPS listener disabled until TLS cert + OIDC are configured together.
  # Re-enable with cert-manager + ustbite-tls-secret when OIDC is set up.
