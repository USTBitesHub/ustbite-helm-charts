############################################################
# USTBite HTTPRoutes
# URL architecture:
#   Browser → haproxy → kgateway → (strip /api prefix) → backend
#
#   /                → ustbite-frontend  (React SPA)
#   /api/auth        → user-service:8001  rewrite → /auth
#   /api/users       → user-service:8001  rewrite → /users
#   /api/restaurants → restaurant-service:8002  rewrite → /restaurants
#   /api/orders      → order-service:8003  rewrite → /orders
#   /api/payments    → payment-service:8004  rewrite → /payments
#   /api/delivery    → delivery-service:8005  rewrite → /delivery
#   /argocd          → argocd-server:80
############################################################

# ─── Frontend SPA (catch-all, must be last / least specific) ─
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ustbite-public-routes
  namespace: kgateway
spec:
  parentRefs:
    - name: ustbite-gateway
      namespace: kgateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ustbite-frontend-prod
          namespace: ustbite-frontend
          port: 8080
---
# ─── API Routes — all strip /api prefix before forwarding ────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ustbite-api-routes
  namespace: kgateway
spec:
  parentRefs:
    - name: ustbite-gateway
      namespace: kgateway
  rules:
    # Auth endpoints (login, register, logout) → user-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
        - name: ustbite-user-service-prod
          namespace: ustbite-backend
          port: 8001

    # User profile endpoints → user-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /users
      backendRefs:
        - name: ustbite-user-service-prod
          namespace: ustbite-backend
          port: 8001

    # Restaurant endpoints → restaurant-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/restaurants
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /restaurants
      backendRefs:
        - name: ustbite-restaurant-service-prod
          namespace: ustbite-backend
          port: 8002

    # Order endpoints → order-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /orders
      backendRefs:
        - name: ustbite-order-service-prod
          namespace: ustbite-backend
          port: 8003

    # Payment endpoints → payment-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/payments
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /payments
      backendRefs:
        - name: ustbite-payment-service-prod
          namespace: ustbite-backend
          port: 8004

    # Delivery endpoints → delivery-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/delivery
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /delivery
      backendRefs:
        - name: ustbite-delivery-service-prod
          namespace: ustbite-backend
          port: 8005

    # Cart endpoints → cart-service (PostgreSQL-backed, persists across sessions)
    - matches:
        - path:
            type: PathPrefix
            value: /api/cart
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /cart
      backendRefs:
        - name: cart-service-prod
          namespace: ustbite-backend
          port: 8010

    # AI Agent endpoints → ai-agent-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/agent
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: ustbite-ai-agent-service-prod
          namespace: ustbite-backend
          port: 8009

---
# ─── ArgoCD UI (admin access via gateway) ─────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ustbite-argocd-route
  namespace: kgateway
spec:
  parentRefs:
    - name: ustbite-gateway
      namespace: kgateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80
