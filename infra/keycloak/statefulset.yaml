apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
    component: identity-provider
    team: ustbite
spec:
  serviceName: keycloak-svc
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        component: identity-provider
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: keycloak
          # Pinned version — do not use 'latest' in production
          image: quay.io/keycloak/keycloak:24.0.1
          # start-dev uses embedded H2 DB — fine for demo, NO data persistence
          # For production: use start + KC_DB=postgres
          args: ["start-dev"]
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            # edge = tells Keycloak it's behind a reverse proxy (kgateway/Envoy)
            - name: KC_PROXY
              value: "edge"
            # dev-file = embedded H2 database (demo mode, data lost on restart)
            - name: KC_DB
              value: "dev-file"
            # Reduce log noise for demo
            - name: KC_LOG_LEVEL
              value: "INFO"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
